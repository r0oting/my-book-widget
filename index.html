<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노션 도서 검색 위젯</title>
    <style>
        /* 노션 스타일 위젯 외형 */
        body {
            margin: 0;
            padding: 15px;
            background-color: #ffffff;
            border: 1px solid #e9e9e9;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
        }
        .search-container {
            display: flex;
            gap: 8px;
        }
        /* 연회색 1px 실선 테두리 검색창 */
        .search-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e9e9e9;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus {
            border-color: #9FD4B3FF; /* 노션 블루 포인트 (선택 사항) */
        }
        .search-btn {
            padding: 8px 16px;
            background-color: #ffffff;
            border: 1px solid #e9e9e9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .search-btn:hover {
            background-color: #f7f7f7;
        }
        /* 검색 결과 리스트 */
        .result-list {
            margin-top: 12px;
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .result-item {
            padding: 10px;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
            font-size: 13px;
        }
        .result-item:hover {
            background-color: #f7f7f7;
        }
        .status {
            margin-top: 8px;
            font-size: 12px;
            color: #868686;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="query" class="search-input" placeholder="도서명을 입력하세요...">
        <button onclick="searchBooks()" class="search-btn">검색</button>
    </div>
    
    <ul id="results" class="result-list"></ul>
    <div id="status" class="status"></div>

    <script>
        // 백엔드 서버 주소 (구배포 후 생성된 URL 입력)
        const BACKEND_URL = 'https://my-book-backend.vercel.app';

        async function searchBooks() {
            const query = document.getElementById('query').value;
            const statusDiv = document.getElementById('status');
            const resultsUl = document.getElementById('results');
            resultsUl.innerHTML = '';
            
            if(!query) return alert('도서명을 입력해주세요.');
            
            statusDiv.innerText = '검색 중...';
            
            try {
                // 백엔드를 통해 알라딘 검색 API 호출
                const res = await fetch(`${BACKEND_URL}/api/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                statusDiv.innerText = '';
                if(data.item && data.item.length > 0) {
                    data.item.forEach(book => {
                        const li = document.createElement('li');
                        li.className = 'result-item';
                        li.innerText = `[${book.author}] ${book.title}`;
                        // 클릭 시 노션 DB 추가 함수 실행
                        li.onclick = () => addToNotion(book);
                        resultsUl.appendChild(li);
                    });
                } else {
                    statusDiv.innerText = '검색 결과가 없습니다.';
                }
            } catch (err) {
                statusDiv.innerText = '검색 중 오류가 발생했습니다.';
                console.error(err);
            }
        }

        async function addToNotion(book) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = `[${book.title}] 노션에 등록 중...`;
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/add-to-notion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(book)
                });
                
                if(res.ok) {
                    statusDiv.innerText = '🎉 성공적으로 노션 DB에 추가되었습니다!';
                    document.getElementById('results').innerHTML = '';
                } else {
                    statusDiv.innerText = '❌ 노션 등록에 실패했습니다.';
                }
            } catch (err) {
                statusDiv.innerText = '❌ 오류가 발생했습니다.';
                console.error(err);
            }
        }
    </script>
</body>
</html>
