<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노션 도서 검색 위젯</title>
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #ffffff;
            border: 1px solid #e9e9e9;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
        }
        .search-container {
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e9e9e9;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus {
            border-color: #9FD4B3FF;
        }
        .search-btn {
            padding: 8px 16px;
            background-color: #ffffff;
            border: 1px solid #e9e9e9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .search-btn:hover {
            background-color: #f7f7f7;
        }
 
        /* ✅ 검색 결과 리스트 */
        .result-list {
            margin-top: 12px;
            list-style: none;
            padding: 0;
            max-height: 320px;
            overflow-y: auto;
        }
        .result-item {
            display: flex;         /* ✅ 가로 정렬 */
            align-items: center;
            gap: 12px;
            padding: 8px 6px;
            border-bottom: 1px solid #f1f1f1;
            cursor: pointer;
        }
        .result-item:hover {
            background-color: #f7f7f7;
        }
 
        /* ✅ 표지 이미지 */
        .book-cover {
            width: 42px;
            height: 60px;
            object-fit: cover;
            border-radius: 2px;
            flex-shrink: 0;
            background-color: #f0f0f0;
        }
        .book-cover-placeholder {
            width: 42px;
            height: 60px;
            flex-shrink: 0;
            background-color: #ececec;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
 
        /* ✅ 도서명 + 저자 텍스트 */
        .book-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
        }
        .book-title {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .book-author {
            font-size: 12px;
            color: #868686;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
 
        .status {
            margin-top: 8px;
            font-size: 12px;
            color: #868686;
        }
    </style>
</head>
<body>
 
    <div class="search-container">
        <input type="text" id="query" class="search-input" placeholder="도서명을 입력하세요..."
               onkeydown="if(event.key==='Enter') searchBooks()">
        <button onclick="searchBooks()" class="search-btn">검색</button>
    </div>
 
    <ul id="results" class="result-list"></ul>
    <div id="status" class="status"></div>
 
    <script>
        const BACKEND_URL = 'https://my-book-backend.vercel.app';
 
        async function searchBooks() {
            const query = document.getElementById('query').value.trim();
            const statusDiv = document.getElementById('status');
            const resultsUl = document.getElementById('results');
            resultsUl.innerHTML = '';
 
            if (!query) return alert('도서명을 입력해주세요.');
 
            statusDiv.innerText = '검색 중...';
 
            try {
                const res = await fetch(`${BACKEND_URL}/api/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
 
                statusDiv.innerText = '';
 
                if (data.item && data.item.length > 0) {
                    data.item.forEach(book => {
                        const li = document.createElement('li');
                        li.className = 'result-item';
 
                        // ✅ 표지 이미지 (없으면 이모지 placeholder)
                        const coverUrl = book.cover || '';
                        if (coverUrl) {
                            const img = document.createElement('img');
                            img.className = 'book-cover';
                            img.src = coverUrl;
                            img.alt = book.title;
                            img.onerror = () => {
                                img.style.display = 'none';
                                const ph = document.createElement('div');
                                ph.className = 'book-cover-placeholder';
                                ph.innerText = '📖';
                                li.insertBefore(ph, img);
                            };
                            li.appendChild(img);
                        } else {
                            const ph = document.createElement('div');
                            ph.className = 'book-cover-placeholder';
                            ph.innerText = '📖';
                            li.appendChild(ph);
                        }
 
                        // ✅ 도서명 + 저자
                        const info = document.createElement('div');
                        info.className = 'book-info';
 
                        const title = document.createElement('div');
                        title.className = 'book-title';
                        title.innerText = book.title || '(제목 없음)';
 
                        const author = document.createElement('div');
                        author.className = 'book-author';
                        author.innerText = book.author || '';
 
                        info.appendChild(title);
                        info.appendChild(author);
                        li.appendChild(info);
 
                        li.onclick = () => addToNotion(book);
                        resultsUl.appendChild(li);
                    });
                } else {
                    statusDiv.innerText = '검색 결과가 없습니다.';
                }
            } catch (err) {
                statusDiv.innerText = '검색 중 오류가 발생했습니다.';
                console.error(err);
            }
        }
 
        async function addToNotion(book) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = `[${book.title}] 노션에 등록 중...`;
 
            try {
                const res = await fetch(`${BACKEND_URL}/api/add-to-notion`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(book)   // ✅ cover 필드 포함해서 그대로 전달
                });
 
                if (res.ok) {
                    statusDiv.innerText = '🎉 성공적으로 노션 DB에 추가되었습니다!';
                    document.getElementById('results').innerHTML = '';
                } else {
                    const err = await res.json();
                    statusDiv.innerText = `❌ 노션 등록 실패: ${err.error || '알 수 없는 오류'}`;
                }
            } catch (err) {
                statusDiv.innerText = '❌ 오류가 발생했습니다.';
                console.error(err);
            }
        }
    </script>
</body>
</html>
